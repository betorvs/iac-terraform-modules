name: Push tests

on:
  push:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-matrix.outputs.modules }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Required to accurately diff branches

      - name: Identify Changed Modules
        id: set-matrix
        run: |
          # Detect unique directories holding modified .tf files
          # Adjust the grep filter if your modules live inside a specific folder like 'modules/'
          BEFORE_SHA="${{ github.event.before }}"
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="HEAD~1"
          fi
          CHANGED_DIRS=$(git diff --name-only $BEFORE_SHA ${{ github.sha }} | grep -E '\.(tf|tftest\.hcl)$' | xargs -I {} dirname {} | grep -v 'tests$' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          
          if [ "$CHANGED_DIRS" == "[]" ] || [ -z "$CHANGED_DIRS" ]; then
            echo "modules=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "modules=$CHANGED_DIRS" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
  terraform-ci:
    runs-on: ubuntu-latest
    needs: ["detect-changes"]
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # 4.0.1
        with:
          terraform_version: "1.14.8"
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: "latest"
      - name: Initialize TFLint Configuration
        working-directory: ${{ matrix.module }}
        run: |
          tflint --init
      - name: Terraform Format Check
        working-directory: ${{ matrix.module }}
        run: terraform fmt -check -recursive
      - name: Validate Terraform Syntax
        working-directory: ${{ matrix.module }}
        run: |
          pwd
          terraform init -backend=false
          terraform validate
      - name: Run TFLint Analysis
        working-directory: ${{ matrix.module }}
        run: tflint -f compact

  integration-tests:
    runs-on: ubuntu-latest
    needs: ["terraform-ci", "detect-changes"]
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # 4.0.1
        with:
          terraform_version: "1.14.8"
      - name: Start MiniStack (Fake AWS Cloud)
        run: docker run -d -p 4566:4566 ministackorg/ministack
      - name: Wait for MiniStack to be ready
        run: |
          echo 'Waiting for MiniStack...'
          for i in $(seq 1 10); do
            curl -s http://localhost:4566/_ministack/health && break
            sleep 2
          done
      - name: Terraform Test
        working-directory: ${{ matrix.module }}
        run: |
          pwd
          terraform init
          terraform test
      
